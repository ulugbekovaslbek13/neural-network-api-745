<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Core Infrastructure Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <nav class="top-navigation">
            <span class="brand-title">MatrixNode v8.1.0</span>
            <div class="system-status"><span class="pulse-dot"></span> Cluster Online</div>
        </nav>
        <section class="viewport-analytics">
            <div class="data-card high-priority">
                <h2>Real-Time Network Operational Telemetry</h2>
                <div class="terminal-stream" id="logStream">Initializing encrypted sockets...</div>
            </div>
        </section>
    </div>
    <script src="main.js"></script>
</body>
</html>
